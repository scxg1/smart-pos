<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="نقطة البيع الذكية - نظام إدارة المبيعات والمخزون" />
    <meta name="theme-color" content="#4f46e5" />
    <title>نقطة البيع الذكية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      #splash-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f172a;z-index:9999;transition:opacity .4s ease}
      #splash-loader.hide{opacity:0;pointer-events:none}
      .splash-content{display:flex;flex-direction:column;align-items:center;gap:24px}
      .splash-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(99,102,241,0.4);animation:splash-pulse 2s ease-in-out infinite}
      .splash-icon svg{width:32px;height:32px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .splash-title{font-family:'Cairo',sans-serif;font-size:24px;font-weight:700;color:#e2e8f0;letter-spacing:.3px}
      .splash-bar{width:200px;height:3px;background:#1e293b;border-radius:3px;overflow:hidden}
      .splash-bar-inner{height:100%;width:40%;background:linear-gradient(90deg,#4f46e5,#818cf8);border-radius:3px;animation:splash-slide 1.4s ease-in-out infinite}
      @keyframes splash-pulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(99,102,241,0.4)}50%{transform:scale(1.06);box-shadow:0 0 60px rgba(99,102,241,0.6)}}
      @keyframes splash-slide{0%{transform:translateX(-100%)}50%{transform:translateX(200%)}100%{transform:translateX(200%)}}
    </style>
    <script>
      window.addEventListener('load',function(){setTimeout(function(){var s=document.getElementById('splash-loader');if(s)s.classList.add('hide');setTimeout(function(){if(s)s.remove()},500)},300)});
    </script>
  </head>
  <body>
    <div id="splash-loader">
      <div class="splash-content">
        <div class="splash-icon">
          <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        </div>
        <div class="splash-title">نقطة البيع الذكية</div>
        <div class="splash-bar"><div class="splash-bar-inner"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
